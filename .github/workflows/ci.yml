name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run validate

  brewbar:
    name: BrewBar · build · test
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install Tuist
        # GOV-005: pin a una version concreta para que un breaking release de
        # Tuist no rompa el job silenciosamente. Actualizar manualmente.
        env:
          TUIST_VERSION: '4.39.0'
        run: |
          curl -Ls "https://install.tuist.io" | TUIST_VERSION="$TUIST_VERSION" bash
          tuist version

      - name: Generate workspace
        working-directory: menubar
        run: tuist generate --no-open

      - name: Build BrewBar
        run: |
          xcodebuild \
            -workspace menubar/Brew-TUI-Bar.xcworkspace \
            -scheme Brew-TUI-Bar \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Run BrewBar tests
        run: |
          xcodebuild \
            -workspace menubar/Brew-TUI-Bar.xcworkspace \
            -scheme Brew-TUI-Bar \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            test
